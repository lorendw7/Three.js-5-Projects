<!DOCTYPE html>
<!-- lang 声明页面语言为简体中文，对浏览器和搜索引擎友好 -->
<html lang="zh-CN">
  <head>
    <!-- 字符编码用 UTF-8，保证中文注释/文字不乱码 -->
    <meta charset="UTF-8" />
    <title>第一课 - 第一个 Three.js 场景</title>
    <style>
      /* 去掉 <body> 默认的 8px 外边距，让画面贴边铺满 */
      body { margin: 0; }
      /* canvas 默认是 inline 元素，底部会有几像素缝隙，改成 block 消除 */
      canvas { display: block; }
    </style>
  </head>
  <body>
    <!--
      这个 HTML 故意写得很"空"：页面里没有任何 Three.js 代码。
      它只做一件事——用 <script type="module"> 引入同目录下的 main.js。
        - type="module"：允许在 main.js 里使用 import 语法
        - src="./main.js"：相对路径，指向本文件夹的 main.js
      之后所有 Three.js 逻辑都写在 main.js 里。
    -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
